{% load static %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/signup.css' %}">

<main class = "signup-page">
    <section class="signup-section">
        <div class="signup-header">
            <div class = "signup-title">회원가입</div>
            <div class = "signup-description">
                간단한 정보로 회원가입을 시작하세요
            </div>
        </div>

        <form class ="signup-form" method="post">
            {% csrf_token %}

            <div class="signup-field">
                <label for = "email" class="signup-label">이메일</label>
                <input type="email" id="email" name="email" class="signup-input" placeholder="이메일을 입력하세요" value="{{ email|default:'' }}">
            </div>

            <div class="signup-field">
                <label for = "username" class="signup-label">아이디</label>
                <input type="text" id="username" name="username" class="signup-input" placeholder="아이디를 입력하세요" value="{{ username|default:'' }}">
            </div>

            <div class="signup-field">
                <label for="password" class="signup-label">비밀번호</label>
                <input type="password" id="password" name="password" class="signup-input" placeholder="비밀번호를 입력하세요">
                <p class="signup-help-text">8자 이상 · 숫자 1개 이상 · 특수문자 1개 이상 포함</p>
            </div>

            <div class="signup-field">
                <label for="password" class="signup-label">비밀번호 확인</label>
                <input type="password" id="confirm" name="confirm" class="signup-input" placeholder="비밀번호를 다시 입력하세요">
            </div>

            <button type="submit" class="signup-button">
                혼놀테스트 시작
            </button>
        </form>
    </section>
</main>

{% if error %}
<script>
    alert("{{ error|escapejs }}");
</script>
{% endif %}
{% endblock %}
