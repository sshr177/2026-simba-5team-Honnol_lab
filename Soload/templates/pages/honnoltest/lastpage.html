{% load static %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/lastpage.css' %}">

<main class="lastpage">
    <section class="result-card">
        <div class="result-text-box">
            <div class="result-title">
                <span>당신의 레벨은</span>
                <span class="result-profile">Lv.{{user_profile.level}} {{user_profile.level_name}}</span>
                <span>입니다</span>
            </div>
        </div>

        <div class="result-character-box">
            <img src="{{ user_profile.character_image }}" alt="{{ user_profile.level_name }}" class="result-character-image">
        </div>

        <a href="{% url 'main' %}" class="soload-start-button">
            솔로드 시작하기
        </a>
    </section>
</main>
{% endblock %}
