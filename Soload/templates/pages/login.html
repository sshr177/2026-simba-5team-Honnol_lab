{% load static %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">

<main class = "login-page">
    <section class="login-section">
        <div class="login-header">
            <div class = "login-title">로그인</div>
            <div class = "login-description">
                아이디와 비밀번호를 입력해주세요
            </div>
        </div>

        <form class ="login-form" method="post" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="login-field">
                <label for = "username" class="login-label">아이디</label>
                <input type="text" id="username" name="username" class="login-input" placeholder="아이디를 입력하세요">
            </div>

            <div class="login-field">
                <label for="password" class="login-label">비밀번호</label>
                <input type="password" id="password" name="password" class="login-input" placeholder="비밀번호를 입력하세요">
            </div>

            <button type="submit" class="login-button">
                로그인하기
            </button>
        </form>
    </section>
</main>
{% endblock %}
